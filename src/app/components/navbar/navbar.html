<!-- Desktop Navbar -->
<nav class="navbar is-primary is-hidden-touch" role="navigation" aria-label="main navigation">
  <div class="container">
    <div class="navbar-brand">
      <a class="navbar-item" routerLink="/">
        <strong class="is-size-4" style="color: var(--main-yellow);">{{ tService.t('hero.title') }}</strong>
      </a>
    </div>

    <div class="navbar-menu">
      <div class="navbar-end">
        <a class="navbar-item" routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
          {{ tService.t('nav.home') }}
        </a>
        <a class="navbar-item" routerLink="/rooms" routerLinkActive="is-active">
          {{ tService.t('nav.rooms') }}
        </a>
        <a class="navbar-item" routerLink="/contact" routerLinkActive="is-active">
          {{ tService.t('nav.contact') }}
        </a>
        
        <!-- Language Switcher Desktop -->
        <div class="navbar-item">
          <div class="field has-addons">
            <p class="control">
              <button class="button is-small" [class.is-warning]="isLang('uk')" (click)="setLang('uk')">
                UA
              </button>
            </p>
            <p class="control">
              <button class="button is-small" [class.is-warning]="isLang('en')" (click)="setLang('en')">
                EN
              </button>
            </p>
          </div>
        </div>

        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-warning has-text-weight-bold" href="https://www.booking.com/hotel/ua/kan-ion.uk.html" target="_blank">
              {{ tService.t('nav.book') }}
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Mobile Bottom Navigation (Visible only on mobile/touch) -->
<div class="mobile-nav is-hidden-desktop">
  <a class="mobile-nav-item" routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
    <i class="fas fa-home"></i>
    <span>{{ tService.t('nav.home') }}</span>
  </a>
  <a class="mobile-nav-item" routerLink="/rooms" routerLinkActive="is-active">
    <i class="fas fa-bed"></i>
    <span>{{ tService.t('nav.rooms') }}</span>
  </a>
  
  <a class="mobile-nav-item call-button-mobile" href="tel:+380673842628">
    <i class="fas fa-phone"></i>
  </a>

  <a class="mobile-nav-item" routerLink="/contact" routerLinkActive="is-active">
    <i class="fas fa-map-marker-alt"></i>
    <span>{{ tService.t('nav.contact') }}</span>
  </a>
  
  <!-- Language Toggle Mobile -->
  <a class="mobile-nav-item" (click)="setLang(isLang('uk') ? 'en' : 'uk')">
    <i class="fas fa-globe"></i>
    <span>{{ isLang('uk') ? 'EN' : 'UA' }}</span>
  </a>
</div>
